<header class="c-topbar">
  <div class="o-container c-topbar__inner">
    <a class="c-brand" href="{{site.baseurl}}/">
      {{ site.title | replace: "'s Zone", "" }}<span class="c-brand__dot"></span>
    </a>

    <nav class="c-nav" aria-label="Primary">
      <ul class="c-nav__list u-lists-reset">
        <li class="c-nav__item c-item_post is-active" data-filter="all">All</li>
        <li class="c-nav__item c-item_post" data-filter="Daily">Daily</li>
        <li class="c-nav__item c-item_post" data-filter="Novel">Novel</li>
        <li class="c-nav__item c-item_post" data-filter="Lyrics">Lyrics</li>
        <li class="c-nav__item c-item_images">Gallery</li>
        <li class="c-nav__item c-item_tags">Tags</li>
      </ul>
    </nav>

    <div class="c-search">
      <div class="c-search__box">
        <label for="js-search-input" class="u-screen-reader-text">Search</label>
        <div data-icon='ei-search' data-size='s'></div>
        <input type="text" id="js-search-input" class="c-search__text" autocomplete="off" placeholder="Search…">
      </div>
      <ul id="js-results-container" class="c-search-results-list"></ul>
    </div>
  </div>
</header>
