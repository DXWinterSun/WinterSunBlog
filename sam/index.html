<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Many Faces of Sam · Winter Sun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700;1,900&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Special+Elite&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: #1a1410; }
  *, *::before, *::after { box-sizing: border-box; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
(async function() {
  const res = await fetch("/src/sam/sam_gallery.jsx");
  let source = await res.text();
  source = source.replace(/^\s*import\s+[^;]+;?\s*$/gm, "");
  source = source.replace(/export\s+default\s+function\s+SamGallery/, "function SamGallery");
  source += "\nwindow.__SamGallery = SamGallery;";
  const { useEffect, useState, useRef, useMemo, useCallback } = React;
  const compiled = Babel.transform(source, { presets: ["react"] }).code;
  (new Function("React", "useEffect", "useState", "useRef", "useMemo", "useCallback", "window", compiled))(
    React, useEffect, useState, useRef, useMemo, useCallback, window
  );
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(window.__SamGallery));
})();
</script>
</body>
</html>
