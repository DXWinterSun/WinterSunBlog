title: Winter Sun's Zone
description: Winter Sun's Zone
baseurl: "" # the subpath of your site, e.g. /blog
url: "wintersun.zone" # the base hostname & protocol for your site, e.g. http://example.com

# Author
author-name:    Winter Sun
author-image:   heading-normal.jpg
author-job:     Translator / Romantic / Dreamer
author-email:   winterzhangyixuan@qq.com # Add your email for contant form.
author-weibo:   https://weibo.com/wintersunzhang
author-bilibili:   https://space.bilibili.com/185894171
about-author:   You found me. Why'd you have to wait to find me?

# Social settings
social-chatgpt: chatgpt
social-newyear: newyear
social-sam: sam


# Newsletter
mailchimp: # Add your MailChimp form identifier. For example - blogenjoyfreedom.us16.list-manage.com/subscribe/post?u=cd56155d76ddeeb4c0bc4d080&amp;id=7a526cd13e

# Google Analytics
google-analytics: # Add your identifier. For example UA-99631805-1

# Comment Section (Disqus)
disqus-identifier: mr-brown # Add your shortname for Disqus Comment. For example mr-brown

# Build settings
kramdown:
  auto_id_prefix: 'heading-'
  smart_quotes: ["apos", "apos", "quot", "quot"]
  toc_levels: 1..3

permalink: /:year/:month/:day/:title/
plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-sitemap

paginate: 7
paginate_path: "/page/:num/"

include:
  - _pages

sass:
  sass_dir: _sass
  style: compressed

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor

gallery_images:
  - counting-stars.png
  - fair-fight.png
  - love-you-for-GC.PNG
  - GCwDuckie-illustration.PNG
  - christmas-tree.PNG
  - ice-and-sky.PNG